<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="/css/home.css">
        <link rel="stylesheet" href="/css/login.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="/js/cookies.js"></script>
        <script src="/js/randomstring.js"></script>
        <script src="/js/hash.js"></script>
        <script src="/js/openpgp.min.js"></script>
        <script src="/js/keygen.js"></script>
        <script src="/js/encryption.js"></script>
        <script src="/js/login.js"></script>

        <title>trollchat - login</title>

        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body class="bg-dark">
        <center>
            <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
                <header class="mb-auto">
                    <div>
                        <a href="/"><h3 class="float-md-start mb-0 logo text-white">trollchat</h3></a>
                        <nav class="nav nav-masthead justify-content-center float-md-end">
                            <a href="/signup"><button class="btn btn-sm rounded-pill btn-secondary px-4 fw-bold border-white bg-white text-black">Sign up</button></a>
                        </nav>
                    </div>
                </header>
            </div>

            <div class="modal modal-signin position-static d-block bg-dark py-5" tabindex="-1" role="dialog">
                <div class="modal-dialog" role="document">
                    <div class="modal-content rounded-5 shadow">
                    <div class="modal-header p-5 pb-4 border-bottom-0">
                        <h2 class="fw-bold mb-0">Login</h2>
                    </div>

                    <div class="modal-body p-5 pt-0">
                        <form class="" action="" onsubmit="login(event)"">
                            <div class="form-floating mb-3">
                                <input type="username" class="form-control rounded-4" id="floatingUsername" placeholder="bob" required>
                                <label for="floatingUsername">Username</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control rounded-4" id="floatingPassword" placeholder="Password" required>
                                <label for="floatingPassword">Password</label>
                            </div>
                            <button class="w-100 mb-2 btn btn-lg rounded-4 btn-primary" type="submit">Login</button>
                            <hr class="my-4">
                            <h2 class="fs-6 fw-bold mb-3">Trying to <a href="/signup">sign up</a>?</h2>
                        </form>
                    </div>
                </div>
            </div>
        </center>
    </body>
</html>
